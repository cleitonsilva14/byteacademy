server.port=8004

spring.mongodb.uri=mongodb://mongodb:mongodb@localhost:27017/byteacademy?authSource=admin
spring.data.mongodb.auto-index-creation=true

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.core.index=DEBUG

# Altera o caminho padrão da interface do Swagger (/swagger-ui.html)
springdoc.swagger-ui.path=/swagger-ui.html
# Altera o caminho onde o JSON bruto da documentação fica disponível
springdoc.api-docs.path=/api-docs
# Organiza os endpoints em ordem alfabética na tela
springdoc.swagger-ui.operationsSorter=method